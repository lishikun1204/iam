spring:
  datasource:
    url: jdbc:h2:mem:iam;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

  sql:
    init:
      mode: always

  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    org.springframework.security: INFO


server:
  port: 8080

spring:
  application:
    name: iam-server

  profiles:
    active: dev

  cache:
    type: redis

  session:
    store-type: redis

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

knife4j:
  enable: true

iam:

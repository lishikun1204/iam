server:
  port: 8080

spring:
  application:
    name: iam-server

  profiles:
    active: dev

  cache:
    type: redis

  session:
    store-type: redis

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

knife4j:
  enable: true

iam:
  security:
    issuer: http://localhost:8080
    cors:
      allowed-origins:
        - http://localhost:5173
        - http://localhost:5174
        - http://10.0.2.7:5173
        - http://10.0.2.7:5174

